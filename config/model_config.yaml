# ═══════════════════════════════════════════════════════════
# BAYREUTHWING — Model & Scanner Configuration (v2.0)
# 100M-Parameter Architecture + Full Adaptive Intelligence
# ═══════════════════════════════════════════════════════════

model:
  name: "CodeTransformer"
  version: "2.0.0"

  # Architecture — 100M Parameters
  vocab_size: 50000
  max_seq_length: 4096
  embedding_dim: 768
  num_heads: 12
  num_layers: 12
  feedforward_dim: 3072
  dropout: 0.1
  num_vulnerability_classes: 35
  activation: "gelu"

  # Token types
  token_types:
    - keyword
    - identifier
    - literal
    - operator
    - delimiter
    - comment
    - string
    - number
    - whitespace
    - unknown

training:
  epochs: 50
  batch_size: 32
  learning_rate: 0.0003
  weight_decay: 0.01
  warmup_steps: 500
  max_grad_norm: 1.0
  mixed_precision: true
  early_stopping_patience: 5
  checkpoint_dir: "checkpoints"
  log_interval: 10

  # Data
  synthetic_samples: 10000
  train_split: 0.8
  val_split: 0.1
  test_split: 0.1

scanner:
  # Analysis modules (multi-agent architecture)
  modules:
    code_analysis:
      enabled: true
      description: "Analyzes code for vulnerability patterns"
    dependency_analysis:
      enabled: true
      description: "Examines imports and third-party dependencies"
    architecture_analysis:
      enabled: true
      description: "Evaluates system architecture and data flow"
    threat_modeling:
      enabled: true
      description: "Models potential attack surfaces and threat vectors"
    mirofish_execution:
      enabled: true
      description: "MiroFish multi-dimensional scenario execution engine"
    dynamic_rules:
      enabled: true
      description: "Hot-loadable dynamic analysis rules"
    internet_discovery:
      enabled: false
      description: "Internet-connected zero-day vulnerability discovery"

  # Scanning parameters
  confidence_threshold: 0.5
  max_file_size_kb: 5120
  recursive: true
  parallel_workers: 4

  # Adaptive intelligence
  adaptive:
    auto_detect_framework: true
    auto_detect_language: true
    adjust_rules_by_context: true
    phase_learning: true
    pattern_correlation: true
    target_profiling: true
    knowledge_graph: true

  # MiroFish execution config
  mirofish:
    max_iterations: 10
    max_scenarios_per_artifact: 25
    max_scenarios_per_iteration: 200
    enable_mutations: true
    enable_compound_detection: true
    enable_multi_dimensional: true
    execution_timeout_seconds: 300
    dimensions:
      - injection
      - authentication
      - cryptography
      - logic
      - data_flow
      - network
      - supply_chain
      - serialization

  # Dynamic rules config
  dynamic_rules:
    rules_dir: "config/dynamic_rules"
    auto_disable_threshold: 0.5   # FP rate above this disables the rule
    auto_promote_threshold: 0.8   # TP rate above this promotes the rule
    hot_reload: true
    max_rules: 1000

  # Internet discovery config
  internet_discovery:
    enabled: false
    nvd_api_key: ""
    github_token: ""
    search_timeout: 30
    max_queries_per_scan: 20
    sources:
      - nvd
      - osv
      - exploitdb
      - cisa_kev
      - github_advisories

  # Supported languages
  languages:
    - python
    - javascript
    - java
    - c
    - cpp
    - php
    - ruby
    - go
    - rust
    - typescript
    - kotlin
    - swift
    - csharp

  # File extensions
  extensions:
    python: [".py"]
    javascript: [".js", ".jsx", ".mjs"]
    typescript: [".ts", ".tsx"]
    java: [".java"]
    c: [".c", ".h"]
    cpp: [".cpp", ".hpp", ".cc", ".cxx"]
    php: [".php"]
    ruby: [".rb"]
    go: [".go"]
    rust: [".rs"]
    kotlin: [".kt", ".kts"]
    swift: [".swift"]
    csharp: [".cs"]

  # Severity scoring weights
  severity:
    critical_threshold: 0.9
    high_threshold: 0.7
    medium_threshold: 0.5
    low_threshold: 0.3

report:
  formats: ["console", "json", "html"]
  default_format: "console"
  include_code_snippets: true
  include_recommendations: true
  include_cwe_mapping: true
  include_owasp_mapping: true
  include_learning_stats: true
  include_mirofish_report: true
  max_findings_per_file: 50

